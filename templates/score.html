{% extends 'base.html' %}

{% block title %}Money Score{% endblock %}

{% block content %}
<div id="score" class="page active">
  <div class="page-title">Money <span>Score</span></div>
  <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; align-items: start; max-width: 900px;">
    <div class="card">
      <div class="card-title">Enter your financial details</div>
      <div class="form-grid">
        <div><label>Monthly Income (₹)</label><input type="number" required min="0" id="s_income" placeholder="e.g. 80000"></div>
        <div><label>Monthly Expenses (₹)</label><input type="number" required min="0" id="s_expenses" placeholder="e.g. 40000"></div>
        <div><label>Monthly Savings (₹)</label><input type="number" required min="0" id="s_savings" placeholder="e.g. 20000"></div>
        <div><label>Investments (₹)</label><input type="number" required min="0" id="s_invest" placeholder="e.g. 500000"></div>
        <div><label>Total Debt (₹)</label><input type="number" required min="0" id="s_debt" placeholder="e.g. 100000"></div>
        <div><label>Emergency Fund (₹)</label><input type="number" required min="0" id="s_emergency" placeholder="e.g. 240000"></div>
        <div>
<label>Credit Utilization (%)</label>
<input type="number" min="0" max="100" id="s_utilization"
placeholder="e.g. 25">
</div>

<div>
<label>Payment Timeliness (%)</label>
<input type="number" min="0" max="100" id="s_payment"
placeholder="e.g. 95">
</div>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn btn-gold" style="flex:1" onclick="calcScore()" id="scoreBtn">Calculate Money Score</button>
        <button class="btn btn-ghost" style="flex:1" onclick="resetScore()" id="scoreResetBtn">Reset</button>
      </div>
      <div id="scoreResult" class="result-box"></div>
      <div id="creditFeedback"
class="result-box"
style="margin-top:15px">
</div>
      <div id="export-section" style="display:none; gap:10px; margin-top:14px;">
        <button class="btn btn-ghost" style="flex:1" onclick="exportReport('csv')" id="exportCsvBtn">⬇️ Download CSV</button>
        <button class="btn btn-ghost" style="flex:1" onclick="exportReport('pdf')" id="exportPdfBtn">📄 Download PDF</button>
      </div>
    </div>
    <div class="card" style="grid-column: 2 / span 1; min-height: 380px;">
      <div class="card-title">Financial Health Dashboard</div>
      <link rel="stylesheet" href="/static/styles/financial-health.css">
      <div style="margin-top: 10px;">
        <div class="fin-health-grid" id="finHealthGrid"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let scoreChartInstance = null;

  function renderFinancialHealthDashboard(breakdown) {
    const grid = document.getElementById('finHealthGrid');
    if (!grid) return;
    grid.innerHTML = '';

    if (!breakdown || !breakdown.components) {
      grid.innerHTML = `<div style="padding:12px;color:var(--muted);font-size:13px;">No breakdown data available.</div>`;
      return;
    }

    breakdown.components.forEach((comp, idx) => {
      const scorePct = Math.round((comp.score / comp.max_score) * 100);

      const peerText = comp.peer_benchmark_text || '';
      const peerVal = (comp.peer_benchmark_value !== null && comp.peer_benchmark_value !== undefined)
        ? comp.peer_benchmark_value
        : null;

      const peerBlock = peerText
        ? `<div class="small-row">${peerText}</div>`
        : `<div class="small-row">Peer benchmark unavailable</div>`;

      const tipsHtml = (Array.isArray(comp.tips) ? comp.tips : [])
        .slice(0, 5)
        .map(t => `<li>${t}</li>`)
        .join('');

      const collapseId = `finHealthCollapse_${idx}`;

      grid.innerHTML += `
        <div class="fin-health-card">
          <div class="fin-health-top">
            <div>
              <h4>${comp.label}</h4>
              <div class="fin-health-score" style="color:var(--text);">${comp.score}/${comp.max_score}</div>
              <div class="fin-health-meta">Tier: ${comp.tier}</div>
            </div>
            <div class="fin-health-pill">${comp.your_value}${comp.unit === '% of income' ? '%' : ''}</div>
          </div>

          <div class="fin-health-bar" aria-label="progress">
            <div class="fill" style="width:${scorePct}%;"></div>
          </div>

          ${peerBlock}

          <div class="fin-health-actions">
            <div class="fin-health-meta">${comp.interpretation}</div>
            <button class="fin-health-btn" type="button" onclick="toggleFinHealthCollapse('${collapseId}')">Deep Dive</button>
          </div>

          <div id="${collapseId}" class="fin-health-collapse">
            <div class="calc">${comp.calculation}</div>
            <div class="small-row">Your value: ${comp.your_value}${comp.unit === '% of income' ? '%' : ''}</div>
            <div class="small-row">Peer benchmark: ${peerVal !== null ? peerVal : 'N/A'}${comp.unit === '% of income' ? '%' : ' months'}</div>
            <div class="small-row" style="margin-top:8px;color:var(--muted);">Personalized tips</div>
            <ul class="tips">${tipsHtml}</ul>
          </div>
        </div>
      `;
    });
  }

  function toggleFinHealthCollapse(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('visible');
  }

  async function calcScore() {
    const incomeRaw = document.getElementById('s_income').value;
    const expensesRaw = document.getElementById('s_expenses').value;
    const savingsRaw = document.getElementById('s_savings').value;
    const investRaw = document.getElementById('s_invest').value;
    const debtRaw = document.getElementById('s_debt').value;
    const emergencyRaw = document.getElementById('s_emergency').value;
    const utilizationRaw =
document.getElementById('s_utilization').value;

const paymentRaw =
document.getElementById('s_payment').value;


    if (
!incomeRaw ||
!expensesRaw ||
!savingsRaw ||
!investRaw ||
!debtRaw ||
!emergencyRaw ||
!utilizationRaw ||
!paymentRaw
){
      showResult('scoreResult', '⚠ Please fill in all fields.');
      return;
    }
    const income = parseFloat(incomeRaw);
    const expenses = parseFloat(expensesRaw);
    const savings = parseFloat(savingsRaw);
    const invest = parseFloat(investRaw);
    const debt = parseFloat(debtRaw);
    const emergency = parseFloat(emergencyRaw);
const utilization = parseFloat(utilizationRaw);
const payment = parseFloat(paymentRaw);
    const dti =
income > 0 ? (debt / income) * 100 : 0;


let creditScore = 300;


// Payment history (35%)
if(payment >= 95){
 creditScore += 200;
}
else if(payment >=80){
 creditScore += 120;
}


// Credit utilization (30%)
if(utilization <=30){
 creditScore +=150;
}
else if(utilization <=50){
 creditScore +=80;
}


// DTI
if(dti <=40){
 creditScore +=100;
}


creditScore =
Math.min(850, creditScore);
const feedback = await apiFetch('/credit-feedback',{
    score: creditScore,
    dti: dti,
    utilization: utilization,
    payment: payment
});

document.getElementById("creditFeedback").innerHTML =
`
<b>AI Credit Advice</b>
<br>
${feedback.message}
`;
   
    
    if ([income, expenses, savings, invest, debt, emergency].some(val=>val<0)){
      showResult('scoreResult','Inputs cannot be negative.');
      return;
    }
    if (expenses>=income){
      if (savings>0){
        showResult('scoreResult','Savings cannot be there when expenses equal or exceed income.');
        return;
      }
    }else{
      if ((savings+expenses)>income){
        showResult('scoreResult','The sum of Savings and Expenses could not exceed the income.');
        return;
      }
    }

    setLoading('scoreBtn', true);
    try {
      const data = await apiFetch('/money-score', {
        income: parseFloat(income),
        expenses: parseFloat(expenses),
        savings: parseFloat(savings),
        investments: parseFloat(invest),
        debt: parseFloat(debt),
        emergency: parseFloat(emergency)
      });

      if (data.error) {
        showResult('scoreResult', `⚠ ${data.error}`);
      } else {
        const color = data.score >= 80 ? '#2ecc8a' : data.score >= 60 ? '#d4a843' : '#e05252';
        const circumference = 2 * Math.PI * 54;
        const offset = circumference - (data.score / 100) * circumference;
        showResult('scoreResult', `
          <div style="text-align:center;margin-bottom:10px">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px">Your Money Score</div>
            <div class="score-container">
              <svg class="score-circle-svg">
                <circle class="score-circle-bg" cx="65" cy="65" r="54" />
                <circle class="score-circle-bar" cx="65" cy="65" r="54" 
                        stroke="${color}" 
                        stroke-dasharray="${circumference}" 
                        stroke-dashoffset="${offset}" />
              </svg>
              <div class="score-text-overlay">
                <div style="font-family:'Outfit',sans-serif;font-size:42px;font-weight:800;color:${color}">${data.score}</div>
                <div style="font-size:11px;font-weight:600;color:var(--text);margin-top:-2px">${data.status}</div>
                <div style="margin-top:20px;padding-top:15px;border-top:1px solid var(--border)">
    <div style="font-size:12px;color:var(--muted)">
        Credit Health Score
    </div>

    <div style="font-size:30px;font-weight:800;color:#14c8bf">
        ${creditScore}/850
    </div>

    <div style="font-size:12px;color:var(--muted)">
        DTI Ratio: ${dti.toFixed(2)}% |
        Utilization: ${utilization}%
    </div>
</div>
              </div>
            </div>
          </div>
        `);

        updateReportData({
          income, expenses, savings,
          investments: invest,
          debt, emergency,
          money_score: `${data.score} (${data.status})`
        });
        showExportSection();

        // Render Financial Health Dashboard (from server breakdown)
        renderFinancialHealthDashboard(data.breakdown);

        // Keep compatibility: if older backend returns no breakdown, fall back to old chart.
        if (!data.breakdown || !data.breakdown.components) {
          showResult('scoreResult', '⚠ Breakdown unavailable on server.');
        }
      }
    } catch (e) {
      showResult('scoreResult', '⚠ Could not reach server.');
    }
    setLoading('scoreBtn', false);
  }

  function resetScore() {
    document.getElementById('s_income').value = '';
    document.getElementById('s_expenses').value = '';
    document.getElementById('s_savings').value = '';
    document.getElementById('s_invest').value = '';
    document.getElementById('s_debt').value = '';
    document.getElementById('s_emergency').value = '';
    const res = document.getElementById('scoreResult');
    res.innerHTML = '';
    res.classList.remove('visible');
    if (scoreChartInstance) {
      scoreChartInstance.destroy();
      scoreChartInstance = null;
    }
    const exportSection = document.getElementById('export-section');
    if (exportSection) exportSection.style.display = 'none';
  }
</script>
{% endblock %}
