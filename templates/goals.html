{% extends 'base.html' %}

{% block title %}Financial Goals{% endblock %}

{% block content %}
<div id="goals" class="page active">
  <div class="page-title">🎯 Financial <span>Goals Tracker</span></div>

  <div class="dash-grid" style="grid-template-columns: 1fr; margin-bottom: 20px;">
    <div class="card">
      <div class="card-title">Add New Goal</div>
      <div class="chat-input-row" style="gap: 10px; flex-wrap: wrap;">
        <input type="text" id="goalName" placeholder="Goal name (e.g., Emergency Fund)" style="flex: 2; min-width: 150px;">
        <input type="number" id="goalTarget" placeholder="Target amount" min="0" step="0.01" style="flex: 1; min-width: 100px;">
        <input type="number" id="goalCurrent" placeholder="Current saved" min="0" step="0.01" style="flex: 1; min-width: 100px;" value="0">
        <select id="goalCurrency" style="flex: 1; min-width: 80px; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text);">
          <option value="INR" selected>INR (₹)</option>
          <option value="USD">USD ($)</option>
          <option value="EUR">EUR (€)</option>
          <option value="GBP">GBP (£)</option>
          <option value="JPY">JPY (¥)</option>
          <option value="CAD">CAD ($)</option>
          <option value="AUD">AUD ($)</option>
          <option value="AED">AED (د.إ)</option>
          <option value="SGD">SGD ($)</option>
        </select>
        <input type="month" id="goalDate" style="flex: 1; min-width: 120px;">
        <button class="btn btn-gold" onclick="addGoal()">Add Goal</button>
      </div>
    </div>
  </div>

  <div id="goalsList" class="dash-grid"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function loadGoals() {
    try {
      const res = await fetch('/api/goals');
      const data = await res.json();
      const goalsListEl = document.getElementById('goalsList');

      if (data.goals.length === 0) {
        goalsListEl.innerHTML = `
          <div class="card" style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--muted);">
            <div style="font-size: 48px; margin-bottom: 10px;">🎯</div>
            <div style="font-size: 18px;">No goals yet! Start saving for your dreams.</div>
          </div>
        `;
        return;
      }

      const symbolMap = {
        'INR': '₹', 'USD': '$', 'EUR': '€', 'GBP': '£',
        'JPY': '¥', 'CAD': '$', 'AUD': '$', 'AED': 'د.إ', 'SGD': '$'
      };

      goalsListEl.innerHTML = data.goals.map(goal => {
        const remaining = goal.target_amount - goal.current_amount;
        const targetDt = new Date(goal.target_date + '-01');
        const now = new Date();
        let monthsRemaining = (targetDt.getFullYear() - now.getFullYear()) * 12 + (targetDt.getMonth() - now.getMonth());
        if (monthsRemaining <= 0) monthsRemaining = 1;
        const monthlyNeeded = remaining / monthsRemaining;

        const pct = goal.progress_percent > 100 ? 100 : goal.progress_percent;
        const pctColor = pct >= 100 ? '#22c55e' : (pct >= 75 ? '#d4a843' : (pct >= 50 ? '#f59e0b' : '#ef4444'));

        const curr = goal.currency || 'INR';
        const sym = symbolMap[curr] || curr;

        return `
          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
              <div style="font-size: 20px; font-weight: 700; color: var(--text);">${goal.name}</div>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 12px;" onclick="editGoal(${goal.id})">✏️ Edit</button>
                <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 12px;" onclick="deleteGoal(${goal.id})">✖</button>
              </div>
            </div>

            <div style="margin-bottom: 10px;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                <span style="color: var(--muted);">Progress</span>
                <span style="color: ${pctColor}; font-weight: 600;">${pct}%</span>
              </div>
              <div style="background: var(--border); border-radius: 10px; height: 12px; overflow: hidden;">
                <div style="height: 100%; width: ${pct}%; background: ${pctColor}; border-radius: 10px; transition: width 0.3s;"></div>
              </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
              <div style="padding: 10px; background: rgba(212, 168, 67, 0.1); border-radius: 8px;">
                <div style="font-size: 12px; color: var(--muted);">Target</div>
                <div style="font-size: 18px; font-weight: 700; color: var(--gold); font-family: monospace;">${sym}${fmtNum(goal.target_amount)}</div>
              </div>
              <div style="padding: 10px; background: rgba(34, 197, 94, 0.1); border-radius: 8px;">
                <div style="font-size: 12px; color: var(--muted);">Saved</div>
                <div style="font-size: 18px; font-weight: 700; color: #22c55e; font-family: monospace;">${sym}${fmtNum(goal.current_amount)}</div>
              </div>
            </div>

            <div style="padding: 10px; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 15px;">
              <div style="display: flex; justify-content: space-between; font-size: 13px;">
                <div>
                  <span style="color: var(--muted);">Target Date:</span>
                  <span style="color: var(--text); font-weight: 600;">${goal.target_date}</span>
                </div>
                <div>
                  <span style="color: var(--muted);">Monthly Need:</span>
                  <span style="color: var(--text); font-weight: 600; font-family: monospace;">${sym}${fmtNum(monthlyNeeded.toFixed(0))}</span>
                </div>
              </div>
            </div>

            ${data.ai_recommendations[goal.id] ? `
              <div style="padding: 10px; background: rgba(147, 112, 219, 0.1); border: 1px solid rgba(147, 112, 219, 0.2); border-radius: 8px; font-size: 13px;">
                <div style="font-weight: 600; color: #9370db; margin-bottom: 5px;">🤖 AI Tips</div>
                <div style="color: var(--text); white-space: pre-line;">${data.ai_recommendations[goal.id]}</div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

    } catch (error) {
      console.error('Error loading goals:', error);
    }
  }

  async function addGoal() {
    const name = document.getElementById('goalName').value.trim();
    const targetAmount = parseFloat(document.getElementById('goalTarget').value);
    const currentAmount = parseFloat(document.getElementById('goalCurrent').value || 0);
    const currency = document.getElementById('goalCurrency').value;
    const targetDate = document.getElementById('goalDate').value;

    if (!name || !targetAmount || targetAmount <= 0 || !targetDate) {
      alert('Please fill in all required fields!');
      return;
    }

    try {
      await apiFetch('/goals', { name, target_amount: targetAmount, current_amount: currentAmount, currency, target_date: targetDate });
      document.getElementById('goalName').value = '';
      document.getElementById('goalTarget').value = '';
      document.getElementById('goalCurrent').value = '0';
      document.getElementById('goalDate').value = '';
      loadGoals();
    } catch (e) {
      alert('Could not add goal!');
      console.error(e);
    }
  }

  async function editGoal(goalId) {
    const newCurrent = prompt('Enter new current amount saved:');
    if (newCurrent === null) return;

    const amount = parseFloat(newCurrent);
    if (isNaN(amount) || amount < 0) {
      alert('Please enter a valid number!');
      return;
    }

    try {
      const res = await fetch(`/goals/${goalId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ current_amount: amount })
      });
      await res.json();
      loadGoals();
    } catch (e) {
      alert('Could not update goal!');
      console.error(e);
    }
  }

  async function deleteGoal(goalId) {
    if (!confirm('Are you sure you want to delete this goal?')) return;
    try {
      await fetch(`/goals/${goalId}`, { method: 'DELETE' });
      loadGoals();
    } catch (e) {
      alert('Could not delete goal!');
      console.error(e);
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    loadGoals();
  });
</script>
{% endblock %}
